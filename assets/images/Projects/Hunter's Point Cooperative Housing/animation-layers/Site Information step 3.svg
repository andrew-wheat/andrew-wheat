  <text x="2487.83981709702" y="899.173458183253" font-family="Arial Narrow" text-anchor="end" fill="#000000" font-size="23.4782638549805">High heat exposure coincides with sustained foot </text>
  <text x="2488.94036068534" y="926.173460883253" font-family="Arial Narrow" text-anchor="end" fill="#000000" font-size="23.4782638549805">traffic, revealing a gap between environmental </text>
  <text x="2488.1149529941" y="953.173463583254" font-family="Arial Narrow" text-anchor="end" fill="#000000" font-size="23.4782638549805">performance and urban activity. The project leverages </text>
  <text x="2488.94036068534" y="980.173466283254" font-family="Arial Narrow" text-anchor="end" fill="#000000" font-size="23.4782638549805">this condition to introduce a shaded, productive </text>
  <text x="2488.57351282257" y="1007.17346898325" font-family="Arial Narrow" text-anchor="end" fill="#000000" font-size="23.4782638549805">corridor that improves comfort while supporting </text>
  <text x="2492.33370341598" y="1034.17347168325" font-family="Arial Narrow" text-anchor="end" fill="#000000" font-size="23.4782638549805">co-located use.</text>
